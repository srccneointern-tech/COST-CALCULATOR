<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexPe Cost Calculator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0d1117; color: #e6edf3; min-height: 100vh; padding: 2rem 1rem; }
  .container { max-width: 780px; margin: 0 auto; }

  .header { text-align: center; margin-bottom: 2rem; }
  .header .logo { font-size: 28px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; }
  .header .logo span { color: #c0392b; }
  .header .tagline { font-size: 14px; color: #8b949e; }

  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
  .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #8b949e; margin-bottom: 1rem; }

  .select-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
  select { width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #e6edf3; font-size: 14px; cursor: pointer; }
  select:focus { outline: none; border-color: #c0392b; }

  .slider-row { display: flex; align-items: center; gap: 12px; margin-bottom: 1rem; }
  .slider-row label { font-size: 13px; color: #8b949e; min-width: 140px; }
  .slider-row input[type=range] { flex: 1; accent-color: #c0392b; cursor: pointer; }
  .slider-val { font-size: 14px; font-weight: 600; min-width: 80px; text-align: right; color: #e6edf3; }

  .plan-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 1rem; }
  @media (max-width: 600px) { .plan-grid { grid-template-columns: 1fr; } .select-row { grid-template-columns: 1fr; } }

  .plan-card { background: #0d1117; border: 1px solid #30363d; border-radius: 10px; padding: 1rem; }
  .plan-card.featured { border: 2px solid #c0392b; background: #160d0d; }
  .plan-badge { display: inline-block; font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 6px; background: #c0392b22; color: #e74c3c; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .plan-name { font-size: 12px; color: #8b949e; margin-bottom: 4px; }
  .plan-price { font-size: 24px; font-weight: 700; color: #e6edf3; margin-bottom: 2px; }
  .plan-net { font-size: 12px; color: #8b949e; margin-bottom: 12px; }
  .plan-net strong { color: #2ea043; }
  .plan-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #21262d; font-size: 12px; color: #8b949e; }
  .plan-row:last-child { border-bottom: none; }
  .plan-row .v { color: #e6edf3; font-weight: 500; }
  .plan-row .v.green { color: #2ea043; }
  .plan-row .v.red { color: #e74c3c; }

  .savings-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 1rem; }
  @media (max-width: 600px) { .savings-grid { grid-template-columns: repeat(2, 1fr); } }
  .stat { background: #0d1117; border: 1px solid #30363d; border-radius: 10px; padding: 1rem; text-align: center; }
  .stat .num { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .stat .num.green { color: #2ea043; }
  .stat .lbl { font-size: 11px; color: #8b949e; }

  .behavior-note { background: #0d1117; border-left: 3px solid #2ea043; border-radius: 0 8px 8px 0; padding: 12px 16px; font-size: 13px; color: #8b949e; line-height: 1.6; }
  .behavior-note strong { color: #2ea043; }

  .footer { text-align: center; margin-top: 2rem; font-size: 12px; color: #484f58; }
  .footer span { color: #c0392b; }

  hr { border: none; border-top: 1px solid #21262d; margin: 1rem 0; }
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo">Nex<span>Pe</span></div>
    <div class="tagline">Ownership, redefined — See your savings vs EMI & BNPL</div>
  </div>

  <div class="card">
    <div class="card-title">Your profile</div>
    <div class="select-row">
      <select id="planType" onchange="calc()">
        <option value="smart">Smart Plan — ₹3,735/month</option>
        <option value="instant">Instant Plan — ₹4,150/month</option>
      </select>
      <select id="deviceTier" onchange="calc()">
        <option value="85500">Mid-premium device — ₹85,500</option>
        <option value="65000">Budget premium — ₹65,000</option>
        <option value="110000">Flagship — ₹1,10,000</option>
      </select>
    </div>
    <div class="slider-row">
      <label>Usage duration</label>
      <input type="range" min="6" max="30" value="18" step="1" id="months" oninput="calc()">
      <span class="slider-val" id="months-out">18 months</span>
    </div>
    <div class="slider-row">
      <label>Upgrade at month</label>
      <input type="range" min="6" max="24" value="12" step="1" id="upgradeAt" oninput="calc()">
      <span class="slider-val" id="upgrade-out">Month 12</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Cost comparison</div>
    <div class="plan-grid" id="cards"></div>
  </div>

  <div class="card">
    <div class="card-title">Your savings vs alternatives</div>
    <div class="savings-grid" id="strip"></div>
    <hr>
    <div class="behavior-note" id="behaviorNote"></div>
  </div>

  <div class="footer">Built for <span>NexPe</span> · GCC 2026 · Synergy, Ramjas College</div>
</div>

<script>
const FX = 95;
const BUYBACK_INR = 300 * FX;
const UPGRADE_FEE = 30 * FX;
const PROTECTION_MONTHLY = 4 * FX;
const PROTECTION_ATTACH = 0.55;

function fmt(n) {
  return '₹' + Math.round(n).toLocaleString('en-IN');
}

function calc() {
  const plan = document.getElementById('planType').value;
  const deviceINR = parseInt(document.getElementById('deviceTier').value);
  const months = parseInt(document.getElementById('months').value);
  const upgradeAt = parseInt(document.getElementById('upgradeAt').value);

  document.getElementById('months-out').textContent = months + ' months';
  document.getElementById('upgrade-out').textContent = 'Month ' + upgradeAt;

  const monthlyFee = plan === 'smart' ? 3735 : 4150;
  const defaultRate = plan === 'smart' ? 0.04 : 0.06;
  const nexpeTotal = monthlyFee * months;
  const nexpeNet = nexpeTotal - BUYBACK_INR;
  const protectionTotal = Math.round(PROTECTION_MONTHLY * PROTECTION_ATTACH * months);
  const upgradeCharge = upgradeAt <= months ? UPGRADE_FEE : 0;

  const emiRate = 0.015;
  const emiMonthly = Math.round(deviceINR * emiRate * Math.pow(1 + emiRate, months) / (Math.pow(1 + emiRate, months) - 1));
  const emiTotal = emiMonthly * months;

  const bnplMonthly = Math.round(deviceINR / months * 1.18);
  const bnplTotal = bnplMonthly * months;

  const savingsVsEmi = emiTotal - nexpeNet;
  const savingsVsBnpl = bnplTotal - nexpeNet;
  const discountMonths = Math.max(0, months - 6);
  const behaviorSaving = months >= 6 ? discountMonths * 175 : 0;

  document.getElementById('cards').innerHTML = `
    <div class="plan-card featured">
      <div class="plan-badge">NexPe ${plan === 'smart' ? 'Smart' : 'Instant'}</div>
      <div class="plan-name">Monthly fee</div>
      <div class="plan-price">${fmt(monthlyFee)}</div>
      <div class="plan-net">Net after buyback: <strong>${fmt(nexpeNet)}</strong></div>
      <div class="plan-row"><span>Total paid</span><span class="v">${fmt(nexpeTotal)}</span></div>
      <div class="plan-row"><span>Buyback at exit</span><span class="v green">-${fmt(BUYBACK_INR)}</span></div>
      <div class="plan-row"><span>Protection included</span><span class="v green">Yes</span></div>
      <div class="plan-row"><span>Default risk</span><span class="v">${Math.round(defaultRate * 100)}%</span></div>
      <div class="plan-row"><span>Exit flexibility</span><span class="v green">Anytime</span></div>
      <div class="plan-row"><span>Ownership path</span><span class="v green">Yes</span></div>
    </div>
    <div class="plan-card">
      <div class="plan-name">Bank EMI (~18% p.a.)</div>
      <div class="plan-price">${fmt(emiMonthly)}</div>
      <div class="plan-net">Total paid: <strong style="color:#e74c3c">${fmt(emiTotal)}</strong></div>
      <div class="plan-row"><span>Total paid</span><span class="v red">${fmt(emiTotal)}</span></div>
      <div class="plan-row"><span>Buyback at exit</span><span class="v red">None</span></div>
      <div class="plan-row"><span>Protection</span><span class="v red">Extra cost</span></div>
      <div class="plan-row"><span>Interest charged</span><span class="v red">Yes</span></div>
      <div class="plan-row"><span>Exit flexibility</span><span class="v red">Locked in</span></div>
      <div class="plan-row"><span>Ownership path</span><span class="v">Immediate</span></div>
    </div>
    <div class="plan-card">
      <div class="plan-name">BNPL / Pay Later</div>
      <div class="plan-price">${fmt(bnplMonthly)}</div>
      <div class="plan-net">Total paid: <strong style="color:#e74c3c">${fmt(bnplTotal)}</strong></div>
      <div class="plan-row"><span>Total paid</span><span class="v red">${fmt(bnplTotal)}</span></div>
      <div class="plan-row"><span>Buyback at exit</span><span class="v red">None</span></div>
      <div class="plan-row"><span>Protection</span><span class="v red">None</span></div>
      <div class="plan-row"><span>Hidden charges</span><span class="v red">Yes</span></div>
      <div class="plan-row"><span>Exit flexibility</span><span class="v red">Penalties</span></div>
      <div class="plan-row"><span>Ownership path</span><span class="v red">No</span></div>
    </div>
  `;

  document.getElementById('strip').innerHTML = `
    <div class="stat"><div class="num green">${fmt(savingsVsEmi)}</div><div class="lbl">saved vs EMI</div></div>
    <div class="stat"><div class="num green">${fmt(savingsVsBnpl)}</div><div class="lbl">saved vs BNPL</div></div>
    <div class="stat"><div class="num">${fmt(BUYBACK_INR)}</div><div class="lbl">buyback — locked Day 1</div></div>
    <div class="stat"><div class="num">${months}</div><div class="lbl">months, zero penalty exit</div></div>
  `;

  document.getElementById('behaviorNote').innerHTML = months >= 6
    ? `<strong>Behavior reward unlocked:</strong> After 6 months of on-time payments your fee drops by ₹150–200/month. Over the remaining ${discountMonths} months, that saves you an additional <strong>${fmt(behaviorSaving)}</strong> — automatically.`
    : 'Use NexPe for <strong>6+ months</strong> to unlock the behavior reward — ₹150–200/month fee reduction for consistent on-time payments.';
}

calc();
</script>
</body>
</html>
